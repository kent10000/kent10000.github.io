<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TV Remote</title>
    <style>
        .aspect-ratio-container {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* Change this value to adjust the aspect ratio (e.g., 75% for 4:3, 56.25% for 16:9) */
        }

        .remote {
            border: 2px solid #ccc;
            padding: 10px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            width: 100%;
            margin-bottom: 5px;
        }

        .frow {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            width: 100%;
            margin-bottom: 5px;
        }

        .button {
            margin: 5px;
            padding: 10px;
            background-color: #f2f2f2;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .placeholder {
            visibility: hidden;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function sendButtonPress(brand, button) {
            // Code to send button press to the TV
            console.log("Button pressed:", button);
        }
    </script>
</head>
<body>
<div class="aspect-ratio-container">
    <div class="remote">
        <div class="row">
            <button class="button" onclick="sendButtonPress('Samsung', 'Power')">Power</button>
            <div class="placeholder"></div>
            <button class="button" onclick="sendButtonPress('Samsung', 'Input')">Input</button>
        </div>
        <div class="row">
            <button class="button" onclick="sendButtonPress('Samsung', '1')">1</button>
            <button class="button" onclick="sendButtonPress('Samsung', '2')">2</button>
            <button class="button" onclick="sendButtonPress('Samsung', '3')">3</button>
        </div>
        <div class="row">
            <button class="button" onclick="sendButtonPress('Samsung', '4')">4</button>
            <button class="button" onclick="sendButtonPress('Samsung', '5')">5</button>
            <button class="button" onclick="sendButtonPress('Samsung', '6')">6</button>
        </div>
        <div class="row">
            <button class="button" onclick="sendButtonPress('Samsung', '7')">7</button>
            <button class="button" onclick="sendButtonPress('Samsung', '8')">8</button>
            <button class="button" onclick="sendButtonPress('Samsung', '9')">9</button>
        </div>
        <div class="row">
            <div class="placeholder"></div>
            <button class="button" onclick="sendButtonPress('Samsung', '0')">0</button>
            <div class="placeholder"></div>
        </div>
        <div class="row"></div>
        <div class="row">
            <button class="button" onclick="sendButtonPress('Samsung', 'Volume Up')">Volume Up</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Mute')">Mute</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Channel Up')">Channel Up</button>
        </div>
        <div class="row">
            <button class="button" onclick="sendButtonPress('Samsung', 'Volume Down')">Volume Down</button>
            <div class="placeholder"></div>
            <button class="button" onclick="sendButtonPress('Samsung', 'Channel Down')">Channel Down</button>

        </div>
        <div class="row"></div>
        <div class="row">
            <button class="button" onclick="sendButtonPress('Samsung', 'Settings')">Settings</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Up')">🞁</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Info')">Info</button>
        </div>
        <div class="row">
            <button class="button" onclick="sendButtonPress('Samsung', 'Left')">🞀</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Select')">Select</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Right')">🞂</button>
        </div>
        <div class="row">
            <button class="button" onclick="sendButtonPress('Samsung', 'Return')">Return</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Down')">🞃</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Exit')">Exit</button>
        </div>
        <div class="row"></div>
        <div class="frow">
            <button class="button" onclick="sendButtonPress('Samsung', 'Red')">R</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Green')">G</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Yellow')">Y</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Blue')">B</button>
        </div>
        <div class="frow">
            <button class="button" onclick="sendButtonPress('Samsung', 'Rewind')">⏪</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Play')">▶</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Pause')">⏸</button>
            <button class="button" onclick="sendButtonPress('Samsung', 'Fastforward')">⏩</button>
        </div>
    </div>
</div>
<script>
    // Adjust the height of the remote to match the aspect ratio
    const remote = document.querySelector('.remote');
    const aspectRatioContainer = document.querySelector('.aspect-ratio-container');
    const aspectRatio = aspectRatioContainer.offsetHeight / aspectRatioContainer.offsetWidth;
    const remoteWidth = remote.offsetWidth;
    const remoteHeight = remoteWidth * aspectRatio;
    remote.style.height = `${remoteHeight}px`;
</script>
</body>
</html>
